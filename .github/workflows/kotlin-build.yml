name: Kotlin / Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'release'
      version:
        description: 'App version (semver)'
        required: false
        default: '1.0.0'
      project_id:
        description: 'Pipeline project ID (for callback)'
        required: false
        default: ''

jobs:
  build-android:
    name: Gradle Build AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Android project exists
        id: check
        run: |
          if [ ! -f "gradlew" ]; then
            echo "No Android project (gradlew not found) — skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        if: steps.check.outputs.skip != 'true'
        run: chmod +x gradlew

      - name: Set version
        if: steps.check.outputs.skip != 'true'
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ inputs.version }}\"/" \
            app/build.gradle || true
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" \
            app/build.gradle || true

      - name: Build release AAB
        if: steps.check.outputs.skip != 'true'
        run: ./gradlew bundle${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}

      - name: Build release APK
        if: steps.check.outputs.skip != 'true'
        run: ./gradlew assemble${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}

      - name: Sign AAB (if keystore available)
        if: steps.check.outputs.skip != 'true' && secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

          jarsigner -verbose \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload AAB
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: app/build/outputs/bundle/**/*.aab
          retention-days: 7

      - name: Upload APK
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7
