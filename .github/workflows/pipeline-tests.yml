name: Pipeline Self-CI — Tests & Docker

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short --timeout=30 -q
        env:
          AI_PROVIDER: mock
          SCOUT_PROVIDER: mock
          DRY_RUN: "true"
          PIPELINE_ENV: ci
          LOG_LEVEL: WARNING
          TELEGRAM_POLLING: "false"
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          GOOGLE_AI_API_KEY: ci-placeholder
          GROQ_API_KEY: ci-placeholder
          TAVILY_API_KEY: ci-placeholder
          TELEGRAM_BOT_TOKEN: "0:ci-placeholder"
          TELEGRAM_OPERATOR_ID: "634992850"
          GITHUB_TOKEN: ci-placeholder
          GITHUB_USERNAME: Valonyx
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_KEY: ci-placeholder
          NEO4J_URI: neo4j+s://ci-placeholder.databases.neo4j.io
          NEO4J_PASSWORD: ci-placeholder
          GCP_PROJECT_ID: ai-factory-pipeline
          GCP_REGION: me-central1
          MONTHLY_BUDGET_USD: "300"
          PER_PROJECT_BUDGET_USD: "25"
          BUDGET_GOVERNOR_ENABLED: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 3

  docker-build:
    name: Build Docker Image (Validation)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-factory-pipeline:test .

      - name: Smoke test container
        run: |
          docker run --rm \
            -e SCOUT_PROVIDER=mock \
            -e AI_PROVIDER=mock \
            ai-factory-pipeline:test python -c "import factory; print('Import OK')"
