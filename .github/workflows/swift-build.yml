name: Swift / iOS Build

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode scheme to build'
        required: false
        default: 'App'
      configuration:
        description: 'Build configuration (Debug/Release)'
        required: false
        default: 'Release'
      version:
        description: 'App version (semver)'
        required: false
        default: '1.0.0'
      project_id:
        description: 'Pipeline project ID (for callback)'
        required: false
        default: ''

jobs:
  build-ios:
    name: Archive & Export IPA
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install CocoaPods dependencies
        run: |
          if [ -f Podfile ]; then
            pod install --repo-update
          fi

      - name: Resolve Swift Package dependencies
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi

      - name: Set build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          agvtool new-version -all $BUILD_NUMBER || true

      - name: Archive
        run: |
          WORKSPACE=""
          if ls *.xcworkspace 1>/dev/null 2>&1; then
            WORKSPACE="-workspace $(ls *.xcworkspace | head -1)"
          else
            WORKSPACE="-project $(ls *.xcodeproj | head -1)"
          fi

          xcodebuild archive \
            $WORKSPACE \
            -scheme "${{ inputs.scheme }}" \
            -configuration "${{ inputs.configuration }}" \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/export/*.ipa
          retention-days: 7

      - name: Upload dSYM
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsym
          path: build/App.xcarchive/dSYMs/
          retention-days: 7
