# AI Factory Pipeline v5.8 — Cloud Build → Cloud Run
# Spec: §7.4.1

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:latest'
      - '.'

  # Push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-factory-pipeline'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:$SHORT_SHA'
      - '--region'
      - 'me-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '10'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'

images:
  - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/ai-factory-pipeline:latest'

timeout: '600s'