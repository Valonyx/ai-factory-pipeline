# AI Factory Pipeline v5.6 - Python Backend Build Workflow
# Referenced by: §4.5.1 CLI Build Paths

name: Python Backend Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Pipeline build identifier'
        required: true
      registry:
        description: 'Container registry'
        required: false
        default: 'gcr.io'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.registry }}/${{ secrets.GCP_PROJECT_ID }}/${{ github.event.repository.name }}:${{ inputs.build_id }}
            ${{ inputs.registry }}/${{ secrets.GCP_PROJECT_ID }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ inputs.build_id }}
          path: |
            Dockerfile
            requirements.txt
          retention-days: 90
